{% extends "posts/base.html" %}
{% load crispy_forms_tags %}


{%block content%}

    <div class="container">
        <div class="topbar">
            <h1 class="title">Enter email for password reset</h1>
        </div>

        <form method="post" enctype="multipart/form-data">
            {% csrf_token %}
            {{form|crispy}}
            <button type="submit" class="btn btn-primary">Reset Email</button>
        </form>

    </div>


{% endblock %}
