{% extends "posts/base.html" %}
{% load crispy_forms_tags %}


{%block content%}

    <div class="container">
        <div class="topbar">
            <h1 class="title"> Sign-Up to our Blog </h1>
        </div>

        <form method="post" class="signup">
            {% csrf_token %}
            {{form|crispy}}
            <button type="submit" class="btn btn-primary" type="submit">Sign-Up</button>
        </form>

    </div>


{% endblock %}
