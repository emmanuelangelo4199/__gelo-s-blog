{% extends "posts/base.html" %}
{% load crispy_forms_tags %}


{%block content%}

    <div class="container">
        <div class="topbar">
            <h1 class="title">Setup a new password</h1>
        </div>

        {% if validlink %}
        <form method="post" enctype="multipart/form-data">
            {% csrf_token %}
            {{form|crispy}}
            <button type="submit" class="btn btn-primary">submit new password</button>
        </form>
        {% else %}
          <p>This link is invalid or has expired. <a href="{% url 'password_reset' %}">Request a new one.</a></p>
        {% endif %}

    </div>


{% endblock %}
